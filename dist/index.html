    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11.11.4/dist/style.css" />
    <style>
      /* React Flow Basic Styles Override if needed */
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      
      /* ANIMAÇÃO DE FLUXO (Corrigida: 0 -> 20 para inverter o sentido) */
      @keyframes dashdraw {
        from {
          stroke-dashoffset: 0;
        }
        to {
          stroke-dashoffset: 20;
        }
      }

      .electric-flow {
        stroke-dasharray: 10; /* Aumentado para melhor visibilidade */
        animation: dashdraw 1s linear infinite;
        stroke: #6366f1; /* Indigo-500 */
        stroke-width: 2.5;
        opacity: 0.8;
      }

      /* Hover na linha para facilitar remoção */
      .react-flow__edge {
        cursor: pointer;
      }

      .react-flow__edge:hover .electric-flow {
        stroke-width: 4;
        opacity: 1;
        stroke: #ef4444 !important; /* Vermelho indicando deleção */
        filter: drop-shadow(0 0 3px rgba(239, 68, 68, 0.5));
      }
      
      .edge-selector {
        cursor: pointer;
      }
    </style>
